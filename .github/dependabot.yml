version: 2
updates:
  - package-ecosystem: terraform
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies", "terraform"]

  - package-ecosystem: terraform
    directory: /examples/basic
    schedule:
      interval: weekly
    labels: ["dependencies", "terraform", "examples"]

  - package-ecosystem: terraform
    directory: /examples/complete
    schedule:
      interval: weekly
    labels: ["dependencies", "terraform", "examples"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: ["dependencies", "github-actions"]
